<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>FreeMarker | HTMX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUU" crossorigin="anonymous">
</head>

<body>
  <div class="wrapper">
    <form method="POST" action="/malladd">
      <input list="provinces" type="text" name="province" id="provinceInput" placeholder="Province" autocomplete="off"
        hx-get="/provinces" hx-target="#provinces" hx-trigger="load">
      <datalist id="provinces">
        <#list provincetables as provincetable>
          <option value="${provincetable.province}">
        </#list>
      </datalist>
      <input type="text" name="mallnameInput" placeholder="Mall Name" value="Gateway">
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
    integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
    crossorigin="anonymous"></script>
</body>

</html>
